databaseChangeLog:
  - changeSet:
      id: 1
      author: marissa
      changes:
        - createTable:
            tableName: roles
            columns:
              - column:
                  name: id
                  type: VARCHAR(21)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: role_name
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
