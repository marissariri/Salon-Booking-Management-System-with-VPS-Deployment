databaseChangeLog:
  - changeSet:
      id: 4
      author: marissa
      changes:
        - createTable:
            tableName: beauticians
            columns:
              - column:
                  name: id
                  type: VARCHAR(21)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: full_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: specialty
                  type: VARCHAR(100)
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: 'ACTIVE'
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
