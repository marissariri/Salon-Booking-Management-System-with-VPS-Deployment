databaseChangeLog:
  - changeSet:
      id: 5
      author: marissa
      changes:
        - createTable:
            tableName: schedules
            columns:
              - column:
                  name: id
                  type: VARCHAR(21)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: service_id
                  type: VARCHAR(21)
                  constraints:
                    nullable: false
              - column:
                  name: beautician_id
                  type: VARCHAR(21)
                  constraints:
                    nullable: false
              - column:
                  name: schedule_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: start_time
                  type: TIME
                  constraints:
                    nullable: false
              - column:
                  name: end_time
                  type: TIME
                  constraints:
                    nullable: false
              - column:
                  name: max_slot
                  type: INT
                  defaultValue: 1
              - column:
                  name: available_slot
                  type: INT
                  defaultValue: 1
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: schedules
            baseColumnNames: service_id
            constraintName: fk_schedule_service
            referencedTableName: services
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: schedules
            baseColumnNames: beautician_id
            constraintName: fk_schedule_beautician
            referencedTableName: beauticians
            referencedColumnNames: id
