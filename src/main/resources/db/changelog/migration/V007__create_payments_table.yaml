databaseChangeLog:
  - changeSet:
      id: 7
      author: marissa
      changes:
        - createTable:
            tableName: payments
            columns:
              - column:
                  name: id
                  type: VARCHAR(21)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: booking_id
                  type: VARCHAR(21)
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: payment_method
                  type: VARCHAR(50)
              - column:
                  name: payment_status
                  type: VARCHAR(20)
                  defaultValue: 'PENDING'
              - column:
                  name: payment_date
                  type: TIMESTAMP
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: payments
            baseColumnNames: booking_id
            constraintName: fk_payment_booking
            referencedTableName: bookings
            referencedColumnNames: id
